<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Faisal Mosque">

  <!-- Pakistan green background -->
  <rect width="100" height="100" fill="#01411C"/>

  <!-- Base platform -->
  <rect x="9" y="81" width="82" height="4" fill="white" rx="1"/>

  <!-- ── FAR LEFT MINARET (tallest) ── -->
  <rect x="4" y="17" width="5" height="64" fill="white" rx="1"/>
  <polygon points="4,19 6.5,6 9,19" fill="white"/>

  <!-- ── NEAR LEFT MINARET ── -->
  <rect x="22" y="25" width="4" height="56" fill="white" rx="1"/>
  <polygon points="22,27 24,15 26,27" fill="white"/>

  <!-- ── NEAR RIGHT MINARET ── -->
  <rect x="74" y="25" width="4" height="56" fill="white" rx="1"/>
  <polygon points="74,27 76,15 78,27" fill="white"/>

  <!-- ── FAR RIGHT MINARET (tallest) ── -->
  <rect x="91" y="17" width="5" height="64" fill="white" rx="1"/>
  <polygon points="91,19 93.5,6 96,19" fill="white"/>

  <!-- ── MAIN PRAYER HALL — tent silhouette ── -->
  <!-- Outer filled triangle -->
  <polygon points="14,81 50,30 86,81" fill="white"/>

  <!-- Faceted panel divider lines (subtle) -->
  <line x1="50" y1="30" x2="33" y2="81" stroke="#01411C" stroke-width="1.2" opacity="0.22"/>
  <line x1="50" y1="30" x2="67" y2="81" stroke="#01411C" stroke-width="1.2" opacity="0.22"/>

  <!-- Entry arch at base of tent -->
  <rect x="43" y="65" width="14" height="16" fill="#01411C"/>
  <path d="M43,65 Q50,57 57,65" fill="#01411C"/>

  <!-- ── CRESCENT at peak ── -->
  <!-- Outer gold circle minus offset inner circle = crescent shape -->
  <circle cx="50" cy="27" r="5.5" fill="#FFD700"/>
  <circle cx="52.8" cy="26" r="4.3" fill="#01411C"/>

</svg>
